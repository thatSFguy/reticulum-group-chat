# reticulum-forwarding-service config.

# admins / mods are LXMF DESTINATION hashes (16 raw bytes / 32 hex chars,
# specifically the lxmf.delivery destination hash of the user's identity —
# NOT the raw identity hash).
#
# The simplest way to find a user's destination hash: have them message
# the service once. The forwarder logs `new sender contact: full
# dest_hash = ...` on first contact. Copy that into this list and
# restart.
#
# admins / mods MUST be at the TOP of the file, before any [section]
# header — TOML scopes top-level keys to whichever section is
# currently active.
admins = [
  # "00112233445566778899aabbccddeeff",
]
mods = [
  # "ffeeddccbbaa99887766554433221100",
]

[service]
# Shown in our LXMF announces. Visible to all Reticulum nodes.
display_name = "Group Chat - send /join"

# Where to store the service's identity, roster, and replay buffer.
# Tilde is expanded.
identity_path = "~/.fwdsvc/identity"
state_path    = "~/.fwdsvc/state.json"
history_path  = "~/.fwdsvc/history.json"

# Drop a user from the roster if we haven't heard an announce or message from
# them in this long.
prune_after = "4w"

# How often to run the prune sweep.
prune_interval = "1h"

# How often to re-broadcast our own announce so other Reticulum nodes
# can learn / refresh our path. Upstream Python rnsd uses 5-15 minutes.
announce_interval = "10m"

# Maximum number of UTF-8 characters allowed in an inbound message from
# a roster member. Messages longer than this are rejected with a polite
# reply to the sender; the message is not forwarded and not added to
# history. Spam-prevention policy limit, separate from the lower wire-
# format size cap (~280 bytes). Set to 0 to disable.
max_inbound_chars = 500

# Maximum number of members in the chat. /join attempts past this cap
# are refused with a "the chat is full" reply; existing and paused
# members both count toward the limit. Set to 0 (default) for
# unlimited.
max_members = 0

# Reticulum I/O interfaces. Currently only "tcp_client" is supported, which
# dials a TCPServerInterface peer (e.g. a public testnet entry node) and
# exchanges HDLC-framed packets in both directions. You can list multiple.
[[interfaces]]
type = "tcp_client"
# rns.michmesh.net is one community-run testnet entry node — replace with
# whatever Reticulum peer you'd like to connect through (a local rnsd, a
# different community node, etc).
addr = "rns.michmesh.net:7822"
# Optional dial timeout; 0 = stdlib default (~30s).
timeout = "10s"

# A second interface (LAN peer, your own rnsd, etc.) — uncomment as needed.
#[[interfaces]]
#type = "tcp_client"
#addr = "10.0.0.42:4242"

[replay]
# When a new (or returning) user joins, replay this many recent messages to
# them, skipping anything older than max_age. Set count = 0 to disable
# replay entirely.
count   = 100
max_age = "7d"

# (admins / mods are now at the top of the file — see the comment block
# at the start. They MUST be top-level keys before any [section] header.)
